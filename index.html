<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DashBuilder AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg-primary: #0f0f1e;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #16213e;
  --border: #2a2a4e;
  --accent: #00d9ff;
  --accent-dark: #0099cc;
  --success: #10b981;
  --danger: #ef4444;
  --text-primary: #f0f0f8;
  --text-secondary: #a0a0b8;
  --text-muted: #6b6b7f;
  --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { height: 100%; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  line-height: 1.6;
}

/* ── MODAL ── */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  backdrop-filter: blur(8px);
}

#modal.hide { display: none; }

.modal-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  width: 92%;
  max-width: 420px;
  box-shadow: var(--shadow);
}

.modal-box h2 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.modal-box h2 span { 
  background: linear-gradient(135deg, var(--accent), #00ffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.modal-box p {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 28px;
}

.modal-box a { 
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.2s;
}

.modal-box a:hover { color: #00ffff; }

#keyInput {
  width: 100%;
  background: var(--bg-primary);
  border: 1.5px solid var(--border);
  color: var(--text-primary);
  padding: 14px 16px;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  margin-bottom: 16px;
  display: block;
  transition: all 0.3s;
}

#keyInput:focus { 
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
  background: rgba(0, 217, 255, 0.02);
}

#keyInput::placeholder { color: var(--text-muted); }

#saveBtn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), #00ffff);
  color: var(--bg-primary);
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: block;
  transition: all 0.3s;
  box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
}

#saveBtn:hover { 
  opacity: 0.95;
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0, 217, 255, 0.4);
}

#saveBtn:active { transform: translateY(0); }

.modal-err {
  color: var(--danger);
  font-size: 13px;
  margin-top: 12px;
  display: none;
  font-weight: 500;
}

/* ── HEADER ── */
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logo { 
  font-size: 20px; 
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo span { 
  background: linear-gradient(135deg, var(--accent), #00ffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.change-key {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.change-key:hover { 
  border-color: var(--accent); 
  color: var(--accent);
  background: rgba(0, 217, 255, 0.05);
}

/* ── MAIN ── */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── CHAT ── */
.chat {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 0;
  transition: width 0.3s ease;
}

.chat.split { width: 45%; }

.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  -webkit-overflow-scrolling: touch;
}

.msgs::-webkit-scrollbar { width: 6px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msgs::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.bubble {
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 85%;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { 
    opacity: 0; 
    transform: translateY(8px);
  }
  to { 
    opacity: 1; 
    transform: translateY(0);
  }
}

.bubble.ai {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  align-self: flex-start;
}

.bubble.ai .who {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
}

.bubble.user {
  background: linear-gradient(135deg, var(--accent), #00ffff);
  color: var(--bg-primary);
  border-radius: 14px 4px 14px 14px;
  align-self: flex-end;
  font-weight: 500;
}

.bubble.status {
  background: transparent;
  border: 1px dashed var(--accent);
  color: var(--accent);
  border-radius: 8px;
  align-self: flex-start;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.dots {
  display: flex;
  gap: 5px;
  padding: 14px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  align-self: flex-start;
  width: fit-content;
}

.dots span {
  width: 7px; 
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
  30% { transform: translateY(-8px); opacity: 1; }
}

/* ── INPUT ── */
.input-wrap {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#msgInput {
  flex: 1;
  background: var(--bg-primary);
  border: 1.5px solid var(--border);
  color: var(--text-primary);
  padding: 12px 14px;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.5;
  transition: all 0.3s;
}

#msgInput:focus { 
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(0, 217, 255, 0.15);
  background: rgba(0, 217, 255, 0.02);
}

#msgInput::placeholder { color: var(--text-muted); }

.icon-btn {
  width: 44px; 
  height: 44px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.icon-btn:hover { 
  border-color: var(--accent); 
  color: var(--accent);
  background: rgba(0, 217, 255, 0.05);
}

.icon-btn.active { 
  background: var(--danger); 
  border-color: var(--danger); 
  color: #fff; 
  animation: pulse 1s infinite; 
}

.icon-btn.send { 
  background: linear-gradient(135deg, var(--accent), #00ffff);
  border-color: var(--accent);
  color: var(--bg-primary);
  font-weight: 700;
}

.icon-btn.send:hover { 
  opacity: 0.9;
  transform: translateY(-2px);
}

.icon-btn:disabled { 
  opacity: 0.4; 
  cursor: not-allowed; 
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
}

/* ── STATUS ── */
.statusbar {
  padding: 8px 20px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

.statusbar.on { color: var(--success); }

/* ── PREVIEW ── */
.preview {
  flex: 1;
  display: none;
  flex-direction: column;
  border-left: 1px solid var(--border);
  min-height: 0;
}

.preview.show { display: flex; }

.preview-top {
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.preview-top span {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

.export-btn {
  background: linear-gradient(135deg, var(--success), #34d399);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.export-btn:hover { 
  opacity: 0.9;
  transform: translateY(-1px);
}

#frame {
  flex: 1;
  border: none;
  background: #fff;
}
</style>
</head>
<body>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h2>Dash<span>Builder</span> AI</h2>
    <p>Enter your free Groq API key to start building beautiful dashboards. Get one at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — takes 2 minutes. Your key stays secure in your browser.</p>
    <input id="keyInput" type="password" placeholder="gsk_..." autocomplete="off" />
    <div class="modal-err" id="keyErr">Please enter a valid Groq key (min. 10 characters)</div>
    <button id="saveBtn" onclick="saveKey()">Let's Build →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">Dash<span>Builder</span> AI</div>
  <button class="change-key" onclick="showModal()">⚙ API Key</button>
</header>

<!-- MAIN -->
<div class="main">
  <div class="chat" id="chat">
    <div class="msgs" id="msgs"></div>
    <div class="statusbar" id="statusbar">Ready</div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Describe your dashboard..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="icon-btn" id="micBtn" onclick="mic()" title="Voice">🎤</button>
        <button class="icon-btn send" id="sendBtn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
  <div class="preview" id="preview">
    <div class="preview-top">
      <span>Preview</span>
      <button class="export-btn" onclick="exportHTML()">⬇ Export HTML</button>
    </div>
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
var KEY = localStorage.getItem('groq_key') || '';
var history = [];
var builtHTML = '';
var building = false;
var recog = null;
var recording = false;

var SYSTEM = `You are DashBuilder AI. Help users build custom HTML dashboards through friendly conversation.

Steps:
1. Ask what kind of dashboard (personal, business, student, etc.)
2. Ask what sections/widgets they want (tasks, habits, goals, journal, tracker, budget, notes, etc.) - encourage 4-8 sections
3. Ask the name and color preferences (dark or light theme, favorite colors)
4. Ask what the built-in AI assistant should help with
5. After 3-5 messages, when you have enough info, output the build command

When ready, output ONLY this — nothing else before or after:
BUILD_DASHBOARD:{"title":"...","subtitle":"...","tabs":["Section1","Section2","Section3","Section4"],"primaryColor":"#hex","accentColor":"#hex","bgColor":"#0f0f1e","aiPurpose":"...","aiSystemPrompt":"..."}

Rules:
- bgColor: dark (#0f0f1e or #1a1a2e) unless user wants light
- tabs: 4-8 relevant sections
- Be warm, fast. Max 2 questions at a time. Build fast once you have the info.`;

// Init
window.addEventListener('load', function() {
  if (KEY) {
    hideModal();
    greet();
  }
});

function showModal() {
  document.getElementById('modal').classList.remove('hide');
  document.getElementById('keyInput').focus();
}

function hideModal() {
  document.getElementById('modal').classList.add('hide');
}

function saveKey() {
  var val = document.getElementById('keyInput').value.trim();
  var err = document.getElementById('keyErr');
  if (!val || val.length < 10) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  KEY = val;
  localStorage.setItem('groq_key', val);
  hideModal();
  if (document.getElementById('msgs').children.length === 0) greet();
}

// Allow Enter key in modal
document.getElementById('keyInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveKey();
});

function greet() {
  bubble('ai', "Hey! I'm DashBuilder. What kind of dashboard do you want to build? Think personal life, business, student planner, client tracker — anything goes!");
}

function bubble(role, text) {
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'bubble ' + role;
  if (role === 'ai') {
    d.innerHTML = '<div class="who">DashBuilder</div>' + text;
  } else {
    d.textContent = text;
  }
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function typing() {
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'dots';
  d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function clearTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function status(text, on) {
  var s = document.getElementById('statusbar');
  s.textContent = text;
  s.className = on ? 'statusbar on' : 'statusbar';
}

async function send() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || building) return;

  // Check if user pasted a BUILD command directly
  if (text.startsWith('BUILD_DASHBOARD:')) {
    input.value = '';
    input.style.height = 'auto';
    try {
      var cfg = JSON.parse(text.replace('BUILD_DASHBOARD:', '').trim());
      bubble('user', '🏗️ Build my dashboard');
      bubble('ai', 'Got it! Building your masterpiece now...');
      await build(cfg);
    } catch(e) { bubble('ai', 'Could not parse that build command. Try describing what you want instead.'); }
    return;
  }

  bubble('user', text);
  input.value = '';
  input.style.height = 'auto';
  history.push({ role: 'user', content: text });

  document.getElementById('sendBtn').disabled = true;
  typing();
  status('Thinking...', true);

  try {
    var res = await fetch('/api/groq', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        apiKey: KEY,
        model: 'llama-3.3-70b-versatile',
        maxTokens: 2000,
        messages: [{ role: 'system', content: SYSTEM }, ...history]
      })
    });

    var data = await res.json();
    clearTyping();

    if (data.error) {
      bubble('ai', '❌ API Error: ' + data.error);
      status('Error');
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    var reply = data.choices[0].message.content.trim();
    history.push({ role: 'assistant', content: reply });

    if (reply.indexOf('BUILD_DASHBOARD:') !== -1) {
      var jsonStr = reply.replace('BUILD_DASHBOARD:', '').trim();
      try {
        var cfg = JSON.parse(jsonStr);
        bubble('ai', '✨ Building your ' + cfg.title + ' now...');
        status('Building...', true);
        building = true;
        await build(cfg);
        building = false;
        history = [];
        status('Ready', true);
      } catch(e) {
        bubble('ai', 'Build config had an issue. Can you describe what you want again?');
        status('Error');
      }
    } else {
      bubble('ai', reply);
      status('Ready', true);
    }
  } catch(e) {
    clearTyping();
    bubble('ai', '⚠️ Connection error: ' + e.message + '. Check your API key and internet connection.');
    status('Error');
  }

  document.getElementById('sendBtn').disabled = false;
}

async function build(cfg) {
  var prompt = `Build a premium single-file HTML dashboard with professional styling.
Return ONLY raw HTML starting with <!DOCTYPE html>. No markdown fences, no explanation.

Title: ${cfg.title}
Subtitle: ${cfg.subtitle || 'Dashboard'}
Colors: background=${cfg.bgColor}, primary=${cfg.primaryColor}, accent=${cfg.accentColor}
Sections to build: ${cfg.tabs.join(', ')}

LAYOUT:
- Fixed left sidebar (220px): logo/title at top, nav links for each section, dark professional bg
- Right main area scrollable: show ALL sections as professional widget cards in a 2-3 col CSS grid
- Sidebar nav links smooth scroll to each section

DESIGN REQUIREMENTS (must look like a $500+ premium template):
- Modern professional fonts: Use 'Inter' or system fonts for body, 'JetBrains Mono' for code
- CSS variables for all colors
- Section cards: rounded corners (16px), subtle border, 24px padding, elevated design
- Each section header has relevant emoji + clear title
- Buttons: professional rounded corners (10px), smooth transitions, hover effects
- All text well-spaced: line-height 1.6+, proper letter spacing
- Decorative touches: gradient accents, subtle shadows, smooth animations
- Color contrast: ensure text is readable (WCAG AA)

SECTIONS - each must be HIGHLY INTERACTIVE:
- Tasks/Todo: checkbox list with strike-through, add item input, delete button, localStorage save
- Habits: daily checkboxes with streak counter, animated progress, localStorage save
- Goals: list with progress %, progress bar with gradient, localStorage save
- Journal/Notes: textarea + save button + list of saved entries with timestamps, localStorage save
- Trackers: metric with +/- buttons, animated progress bar, localStorage save
- Analytics: chart/stats display with data visualization
- Calendar: interactive mini calendar with event marking
- Notes: rich note-taking with colors/tags
- Any other: relevant interactive widgets with professional styling

IMPORTANT:
- Use modern CSS: flexbox, grid, CSS variables, smooth transitions (0.3s)
- Make everything feel responsive and polished
- DO NOT add any chat button, AI panel, or any API-calling script
- Close all HTML tags. End file with </body></html>`;

  try {
    var res = await fetch('/api/groq', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        apiKey: KEY,
        model: 'llama-3.3-70b-versatile',
        maxTokens: 32000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    var data = await res.json();
    if (data.error) { 
      bubble('ai', '❌ Build error: ' + data.error); 
      building = false;
      status('Error');
      return; 
    }

    var html = data.choices[0].message.content;
    // Strip markdown fences
    html = html.replace(/^```html\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

    // Inject working AI chat
    var chat = buildChat(cfg);
    html = html.replace('</body>', chat + '\n</body>');
    if (html.indexOf('</body>') === -1) html += chat;

    builtHTML = html;

    // Show preview
    document.getElementById('preview').classList.add('show');
    document.getElementById('chat').classList.add('split');
    document.getElementById('frame').srcdoc = html;

    bubble('ai', '✅ ' + cfg.title + ' is ready! Click "Export HTML" to download and use it.');
  } catch(e) {
    bubble('ai', '❌ Build failed: ' + e.message);
    building = false;
    status('Error');
  }
}

function buildChat(cfg) {
  return `
<style>
#_fab{position:fixed;bottom:24px;right:24px;background:${cfg.accentColor};color:#000;border:none;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;z-index:9000;box-shadow:0 8px 24px rgba(0,0,0,0.3);transition:all 0.3s;}
#_fab:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
#_panel{position:fixed;right:-410px;top:0;width:380px;height:100%;background:#0f0f1e;border-left:1px solid #2a2a4e;z-index:8999;display:flex;flex-direction:column;transition:right 0.3s ease;box-shadow:-8px 0 24px rgba(0,0,0,0.5);}
#_panel.open{right:0;}
#_ph{padding:16px 18px;background:#1a1a2e;border-bottom:1px solid #2a2a4e;display:flex;align-items:center;justify-content:space-between;}
#_ph strong{color:#f0f0f8;font-size:14px;font-weight:700;}
#_pc{cursor:pointer;background:none;border:none;color:#6b6b7f;font-size:18px;padding:4px 8px;transition:all 0.2s;}
#_pc:hover{color:#00d9ff;}
#_pm{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
#_pm::-webkit-scrollbar{width:4px;}
#_pm::-webkit-scrollbar-track{background:transparent;}
#_pm::-webkit-scrollbar-thumb{background:#2a2a4e;border-radius:2px;}
._m{padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.5;max-width:85%;font-family:'Inter',sans-serif;animation:slideIn 0.3s ease;}
._m.u{background:${cfg.accentColor};color:#000;align-self:flex-end;border-radius:12px 4px 12px 12px;font-weight:500;}
._m.a{background:#1a1a2e;color:#f0f0f8;border:1px solid #2a2a4e;align-self:flex-start;border-radius:4px 12px 12px 12px;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#_pi{padding:14px;border-top:1px solid #2a2a4e;background:#1a1a2e;display:flex;gap:8px;}
#_pi input{flex:1;background:#0f0f1e;border:1.5px solid #2a2a4e;color:#f0f0f8;padding:11px 12px;border-radius:10px;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:all 0.3s;}
#_pi input:focus{border-color:${cfg.accentColor};box-shadow:0 0 20px rgba(0,217,255,0.15);}
#_pi button{background:${cfg.accentColor};color:#000;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:13px;transition:all 0.2s;}
#_pi button:hover{opacity:0.9;transform:translateY(-1px);}
</style>
<button id="_fab" onclick="document.getElementById('_panel').classList.toggle('open')">✨ AI</button>
<div id="_panel">
  <div id="_ph"><strong>${cfg.aiPurpose || 'AI Assistant'}</strong><button id="_pc" onclick="document.getElementById('_panel').classList.remove('open')">✕</button></div>
  <div id="_pm"></div>
  <div id="_pi"><input id="_in" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter')_send()"/><button onclick="_send()">Send</button></div>
</div>
<script>
(function(){
  var K='${KEY}';
  var SP='${(cfg.aiSystemPrompt || 'You are a helpful assistant.').replace(/'/g, "\\'")}';
  var H=[];
  var pm=document.getElementById('_pm');
  function _add(r,t){var d=document.createElement('div');d.className='_m '+r;d.textContent=t;pm.appendChild(d);pm.scrollTop=pm.scrollHeight;return d;}
  window._send=async function(){
    var inp=document.getElementById('_in');
    var t=inp.value.trim();if(!t)return;
    inp.value='';
    _add('u',t);H.push({role:'user',content:t});
    var dot=_add('a','...');
    try{
      var r=await fetch('/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:K,model:'llama-3.3-70b-versatile',maxTokens:1000,messages:[{role:'system',content:SP},...H]})});
      var d=await r.json();
      dot.remove();
      if(d.error){_add('a','Error: '+d.error);return;}
      var rep=d.choices[0].message.content;
      H.push({role:'assistant',content:rep});
      _add('a',rep);
    }catch(e){dot.remove();_add('a','Connection error.');}
  };
  _add('a','Hi! I am your ${cfg.aiPurpose || 'AI Assistant'}. How can I help?');
})();
<\/script>`;
}

function exportHTML() {
  if (!builtHTML) return;
  var b = new Blob([builtHTML], { type: 'text/html' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'dashboard.html';
  a.click();
}

function mic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Voice not supported. Use Chrome or Edge.');
    return;
  }
  if (recording) {
    recog.stop(); return;
  }
  recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.continuous = false;
  recog.interimResults = false;
  recog.onresult = function(e) {
    document.getElementById('msgInput').value = e.results[0][0].transcript;
    recording = false;
    document.getElementById('micBtn').classList.remove('active');
    send();
  };
  recog.onerror = recog.onend = function() {
    recording = false;
    document.getElementById('micBtn').classList.remove('active');
  };
  recog.start();
  recording = true;
  document.getElementById('micBtn').classList.add('active');
  status('Listening...', true);
}
</script>
</body>
</html>
